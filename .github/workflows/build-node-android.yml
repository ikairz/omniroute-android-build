name: Build Node.js for Android (arm64, shell-layer)

# Builds a standalone Node.js binary for android-arm64 so OmniRoute can run as
# the `shell` user (uid 2000) from /data/local/tmp — outside any Termux / device
# space sandbox, so it survives Android multi-user (device-space) switches.
#
# NDK r27c (clang 18): required because node v22 bundles C++20 deps (simdjson uses
# std::ranges, bundled googletest uses the <=> spaceship operator) that DO NOT compile
# against NDK r25b's old libc++ (clang 14): "no member named 'ranges' in namespace 'std'"
# and "invalid operands ... std::strong_ordering". clang 18 has full C++20 <ranges>.
# The old r25b<->r27 tradeoff (nodejs/node#58505: r27 hit stack_trace_posix.cc using
# execinfo backtrace, absent on Android <API33) is resolved in v22.22.2, whose v8.gyp
# routes the android target to stack_trace_android.cc (is_android block).
# android-configure is the official cross-compile entry point in the node source.
#
# IMPORTANT — two hard requirements learned the hard way (run 29707988139 failed):
#   1. Runner MUST be x86_64 (ubuntu-24.04). The NDK toolchain path is hardcoded to
#      linux-x86_64 in tools/android_configure.py, so its clang binaries are x86_64;
#      on an arm64 runner they fail with "cannot execute binary file: Exec format error".
#   2. android_configure.py sets CC/CXX (target = NDK clang) but NOT CC_host/CXX_host.
#      GYP then falls back to $CXX (the NDK arm64 clang) for the HOST tools, producing
#      arm64 host binaries that can't run on the x86_64 build machine. We must export
#      CC_host/CXX_host/LINK_host/AR_host to the native gcc/g++ BEFORE ./configure runs.

on:
  workflow_dispatch:
    inputs:
      node_ref:
        description: "Node.js tag to build (e.g. v22.22.2)"
        required: true
        default: "v22.22.2"
      artifact_name:
        description: "Uploaded artifact name"
        required: true
        default: "node-android-arm64"

permissions:
  contents: read

jobs:
  build:
    name: Cross-compile node for android-arm64
    runs-on: ubuntu-24.04
    # V8 full cross-compile on x86_64 runner exceeds 120 min; 360 is well under the
    # 360-min GitHub Actions job cap. Raised after run 29708978398 was killed at exactly
    # 120 min (timeout) while deep in V8 compilation.
    timeout-minutes: 360

    steps:
      - name: Checkout harness
        uses: actions/checkout@v4

      - name: Install host build deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y python3 g++ make curl zip unzip xz-utils

      - name: Download Android NDK r27c
        run: |
          set -euxo pipefail
          curl -fsSL -o ndk.zip https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q ndk.zip
          echo "NDK=$PWD/android-ndk-r27c" >> "$GITHUB_ENV"

      - name: Clone Node.js source
        env:
          NODE_REF: ${{ github.event.inputs.node_ref || 'v22.22.2' }}
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "$NODE_REF" https://github.com/nodejs/node.git node-src

      - name: Configure for Android (arm64, API 24)
        working-directory: node-src
        run: |
          set -euxo pipefail
          # Force HOST tools to build with the native x86_64 gcc/g++, otherwise GYP's
          # GetEnvironFallback(('CXX_host','CXX'),'g++') picks $CXX = NDK arm64 clang and
          # the host tools (icupkg, mksnapshot, torque, obj.host/*) come out as arm64 and
          # cannot execute on the runner. Must be exported BEFORE ./configure (android-
          # configure runs ./configure internally, inheriting this env).
          export CC_host="$(command -v gcc)"
          export CXX_host="$(command -v g++)"
          export LINK_host="$(command -v g++)"
          export AR_host="$(command -v ar)"
          export RANLIB_host="$(command -v ranlib)"
          echo "CC_host=$CC_host  CXX_host=$CXX_host"
          "$CXX_host" --version | head -1
          ./android-configure "$NDK" 24 arm64

      - name: Build
        working-directory: node-src
        run: |
          set -euxo pipefail
          # Re-assert native host toolchain (belt-and-suspenders; gyp usually bakes these
          # into the .mk at configure time, but re-exporting guards against ?= overrides).
          export CC_host="$(command -v gcc)"
          export CXX_host="$(command -v g++)"
          export LINK_host="$(command -v g++)"
          export AR_host="$(command -v ar)"
          export RANLIB_host="$(command -v ranlib)"
          # Build ONLY the `node` target, not the default `all` (which also builds cctest +
          # bundled googletest test tree). The node binary doesn't depend on gtest, so the
          # `node` gyp target is both faster and avoids the test tree. Output: out/Release/node.
          # (With clang 18 gtest would compile, but there's no reason to build the tests.)
          make -C out BUILDTYPE=Release -j"$(nproc)" node || make -C out BUILDTYPE=Release -j2 node

      - name: Verify node:sqlite built in
        working-directory: node-src
        run: |
          set -euxo pipefail
          # Cannot execute the android binary on the linux runner, but we can
          # confirm the sqlite object file was compiled into the build.
          ls -lh out/Release/node
          find out -name '*.o' -path '*sqlite*' | head || true

      - name: Package binary + libc++_shared.so
        run: |
          set -euxo pipefail
          mkdir -p pkg
          cp node-src/out/Release/node pkg/node
          LIBCXX="$(find "$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android" -name 'libc++_shared.so' | head -1)"
          echo "libc++_shared.so: $LIBCXX"
          cp "$LIBCXX" pkg/libc++_shared.so
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" pkg/node || true
          file pkg/node
          tar -C pkg -czf node-android-arm64.tar.gz node libc++_shared.so
          ls -lh node-android-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name || 'node-android-arm64' }}
          path: node-android-arm64.tar.gz
          if-no-files-found: error
          retention-days: 7
